<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MassMO Controller</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }

  .header { background: #1a1a24; padding: 16px 24px; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .ws-indicator { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .ws-indicator.connected { background: #22c55e; }
  .ws-indicator.error { background: #ef4444; }

  .controls { background: #1a1a24; padding: 16px 24px; border-bottom: 1px solid #2a2a3a; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="text"], input[type="number"] {
    background: #0f0f13; border: 1px solid #2a2a3a; color: #e0e0e0; padding: 8px 12px;
    border-radius: 6px; font-size: 14px; outline: none; min-width: 160px;
  }
  input[type="text"]:focus, input[type="number"]:focus { border-color: #6366f1; }

  button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-bank { background: #1e2030; color: #e0e0e0; border: 1px solid #2a2a3a; }
  .btn-bank.tinkoff { border-color: #fbbf24; color: #fbbf24; }
  .btn-bank.sber { border-color: #22c55e; color: #22c55e; }
  .btn-bank.alfa { border-color: #ef4444; color: #ef4444; }
  .btn-bank.vtb { border-color: #3b82f6; color: #3b82f6; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 20px 24px; }

  .card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px; overflow: hidden; }
  .card-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a2a3a; }
  .card-label { font-size: 16px; font-weight: 600; color: #fff; }
  .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto; }
  .badge.CONNECTING { background: #374151; color: #9ca3af; }
  .badge.IDLE       { background: #064e3b; color: #34d399; }
  .badge.SEARCHING  { background: #1e3a5f; color: #60a5fa; }
  .badge.ACTIVE_PAYOUT { background: #451a03; color: #fb923c; }
  .badge.ERROR      { background: #450a0a; color: #f87171; }
  .badge.STOPPED    { background: #1f2937; color: #6b7280; }

  .card-body { padding: 14px 16px; }
  .payout-info { background: #0f0f13; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.8; }
  .payout-info .amount { font-size: 18px; font-weight: 700; color: #fb923c; }
  .payout-info .label-row { color: #888; font-size: 11px; text-transform: uppercase; }
  .error-msg { color: #f87171; font-size: 12px; margin-bottom: 10px; word-break: break-all; }

  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

  .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .banks { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

  .limits-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px; }
  .limits-row input { width: 90px; }

  .toggles { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .toggle-item { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  .toggle-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #6366f1; }

  .upload-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .upload-row input[type="file"] { font-size: 12px; color: #888; flex: 1; min-width: 0; }

  .empty-state { text-align: center; color: #555; padding: 60px 24px; font-size: 15px; }

  .log { position: fixed; bottom: 0; left: 0; right: 0; background: #0f0f13; border-top: 1px solid #2a2a3a; padding: 8px 16px; font-size: 12px; color: #666; font-family: monospace; max-height: 80px; overflow-y: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="ws-indicator" id="wsIndicator"></div>
  <h1>MassMO Controller</h1>
</div>

<div class="controls">
  <div class="field">
    <label>GoLogin Folder UUID (token hash)</label>
    <input type="text" id="tokenHash" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style="min-width:340px">
  </div>
  <div class="field">
    <label>Профилей</label>
    <input type="number" id="profileCount" value="3" min="1" max="15" style="min-width:70px">
  </div>
  <button class="btn-primary" id="btnStart" onclick="startSession()">Запустить</button>
  <button class="btn-danger" id="btnStop" onclick="stopSession()" disabled>Стоп</button>
</div>

<div class="grid" id="grid">
  <div class="empty-state" id="emptyState">Введите Folder UUID и нажмите «Запустить»</div>
</div>

<div class="log" id="log">Готов</div>

<script>
const API = '';
let ws = null;
let windowStates = {};

// ---- WebSocket ----
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { setWSStatus('connected'); log('WS connected'); };
  ws.onclose = () => { setWSStatus(''); log('WS disconnected, retrying…'); setTimeout(connectWS, 3000); };
  ws.onerror = () => { setWSStatus('error'); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.event === 'window_update' && data.window) {
      windowStates[data.window.window_id] = data.window;
      renderCard(data.window);
    } else if (data.event === 'state_snapshot' && data.windows) {
      data.windows.forEach(w => { windowStates[w.window_id] = w; });
      renderAll();
    }
  };
  // Ping every 20s to keep alive
  setInterval(() => { if (ws && ws.readyState === 1) ws.send('ping'); }, 20000);
}

function setWSStatus(cls) {
  const el = document.getElementById('wsIndicator');
  el.className = 'ws-indicator ' + cls;
}

// ---- Session ----
async function startSession() {
  const tokenHash = document.getElementById('tokenHash').value.trim();
  const count = parseInt(document.getElementById('profileCount').value, 10);
  if (!tokenHash) { log('Введите Folder UUID'); return; }
  document.getElementById('btnStart').disabled = true;
  log(`Запуск сессии: ${count} профилей…`);
  try {
    const res = await api('POST', '/api/v1/session/start', { token_hash: tokenHash, profile_count: count });
    windowStates = {};
    res.forEach(w => { windowStates[w.window_id] = w; });
    renderAll();
    document.getElementById('btnStop').disabled = false;
    log(`Запущено ${res.length} окон`);
  } catch(e) {
    log(`Ошибка: ${e.message}`);
    document.getElementById('btnStart').disabled = false;
  }
}

async function stopSession() {
  document.getElementById('btnStop').disabled = true;
  await api('POST', '/api/v1/session/stop');
  windowStates = {};
  renderAll();
  document.getElementById('btnStart').disabled = false;
  log('Сессия остановлена');
}

// ---- Render ----
function renderAll() {
  const ids = Object.keys(windowStates);
  if (ids.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="empty-state" id="emptyState">Введите Folder UUID и нажмите «Запустить»</div>';
    return;
  }
  document.getElementById('grid').innerHTML = '';
  ids.forEach(id => renderCard(windowStates[id]));
}

function renderCard(w) {
  const existing = document.getElementById('card-' + w.window_id);
  const html = buildCard(w);
  if (existing) {
    existing.outerHTML = html;
  } else {
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();
    document.getElementById('grid').insertAdjacentHTML('beforeend', html);
  }
}

function buildCard(w) {
  const p = w.payout || {};
  const isActive = w.status === 'ACTIVE_PAYOUT';
  const isIdle = w.status === 'IDLE';

  let payoutHtml = '';
  if (isActive && p.amount) {
    payoutHtml = `<div class="payout-info">
      <div class="amount">${p.amount}</div>
      ${p.bank ? `<div><span class="label-row">Банк</span> ${p.bank}</div>` : ''}
      ${p.recipient ? `<div><span class="label-row">Получатель</span> ${p.recipient}</div>` : ''}
      ${p.timer ? `<div><span class="label-row">Истекает</span> ${p.timer}</div>` : ''}
      ${p.rate ? `<div><span class="label-row">Курс</span> ${p.rate} USDT/RUB</div>` : ''}
    </div>`;
  }

  let errorHtml = w.error_msg ? `<div class="error-msg">⚠ ${escHtml(w.error_msg)}</div>` : '';

  let actionsHtml = `<div class="actions">`;
  if (isIdle) {
    actionsHtml += `<button class="btn-primary btn-sm" onclick="cmd('${w.window_id}','REQUEST_PAYOUT',{})">Получить выплату</button>`;
  }
  if (isActive) {
    actionsHtml += `<button class="btn-danger btn-sm" onclick="cmd('${w.window_id}','CANCEL_PAYOUT',{})">Отменить</button>`;
  }
  actionsHtml += `<button class="btn-sm" style="background:#2a2a3a" onclick="cmd('${w.window_id}','REFRESH_STATE',{})">↻ Обновить</button>`;
  actionsHtml += `</div>`;

  let banksHtml = isActive ? `<div class="section-title">Банк</div><div class="banks">
    <button class="btn-bank tinkoff btn-sm" onclick="cmd('${w.window_id}','SELECT_BANK',{bank:'tinkoff'})">T</button>
    <button class="btn-bank sber btn-sm" onclick="cmd('${w.window_id}','SELECT_BANK',{bank:'sber'})">С</button>
    <button class="btn-bank alfa btn-sm" onclick="cmd('${w.window_id}','SELECT_BANK',{bank:'alfa'})">А</button>
    <button class="btn-bank vtb btn-sm" onclick="cmd('${w.window_id}','SELECT_BANK',{bank:'vtb'})">ВТБ</button>
  </div>` : '';

  let limitsHtml = `<div class="section-title">Лимиты (мин / макс)</div>
  <div class="limits-row">
    <input type="number" id="min-${w.window_id}" placeholder="0" style="width:80px">
    <input type="number" id="max-${w.window_id}" placeholder="50000" style="width:80px">
    <button class="btn-sm btn-primary" onclick="saveLimits('${w.window_id}')">Сохранить</button>
  </div>`;

  let togglesHtml = `<div class="section-title">Настройки</div>
  <div class="toggles">
    <label class="toggle-item"><input type="checkbox" onchange="toggleSetting('${w.window_id}','phone',this.checked)" checked> Телефон</label>
    <label class="toggle-item"><input type="checkbox" onchange="toggleSetting('${w.window_id}','card',this.checked)" checked> Карта</label>
    <label class="toggle-item"><input type="checkbox" onchange="toggleSetting('${w.window_id}','account',this.checked)" checked> Счёт</label>
  </div>`;

  let uploadHtml = isActive ? `<div class="upload-row">
    <input type="file" accept=".pdf" id="file-${w.window_id}">
    <button class="btn-sm btn-primary" onclick="uploadReceipt('${w.window_id}')">Загрузить чек</button>
  </div>` : '';

  return `<div class="card" id="card-${w.window_id}">
    <div class="card-header">
      <span class="card-label">${w.label}</span>
      <span class="badge ${w.status}">${w.status}</span>
    </div>
    <div class="card-body">
      ${errorHtml}
      ${payoutHtml}
      ${actionsHtml}
      ${banksHtml}
      ${limitsHtml}
      ${togglesHtml}
      ${uploadHtml}
    </div>
  </div>`;
}

// ---- Commands ----
async function cmd(windowId, type, params) {
  log(`[${windowId.slice(-4)}] ${type}…`);
  try {
    const res = await api('POST', `/api/v1/windows/${windowId}/command`, { type, params });
    log(`[${windowId.slice(-4)}] ${type}: ${res.success ? 'OK' : 'FAIL — ' + res.message}`);
  } catch(e) {
    log(`[${windowId.slice(-4)}] ${type} error: ${e.message}`);
  }
}

async function saveLimits(windowId) {
  const minVal = parseInt(document.getElementById('min-' + windowId).value, 10);
  const maxVal = parseInt(document.getElementById('max-' + windowId).value, 10);
  if (isNaN(minVal) || isNaN(maxVal)) { log('Введите мин и макс'); return; }
  await cmd(windowId, 'UPDATE_LIMITS', { min: minVal, max: maxVal });
}

async function toggleSetting(windowId, setting, enabled) {
  await cmd(windowId, 'TOGGLE_SETTING', { setting, enabled });
}

async function uploadReceipt(windowId) {
  const input = document.getElementById('file-' + windowId);
  if (!input || !input.files[0]) { log('Выберите файл'); return; }
  const formData = new FormData();
  formData.append('file', input.files[0]);
  log(`[${windowId.slice(-4)}] Загрузка чека…`);
  try {
    const res = await fetch(`/api/v1/windows/${windowId}/upload`, { method: 'POST', body: formData });
    const data = await res.json();
    log(`[${windowId.slice(-4)}] Upload: ${data.success ? 'OK' : 'FAIL — ' + data.message}`);
  } catch(e) {
    log(`[${windowId.slice(-4)}] Upload error: ${e.message}`);
  }
}

// ---- Helpers ----
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  el.textContent = `[${time}] ${msg}`;
}

// ---- On load ----
connectWS();

// Fetch initial state
(async () => {
  try {
    const windows = await api('GET', '/api/v1/windows');
    if (windows.length > 0) {
      windows.forEach(w => { windowStates[w.window_id] = w; });
      renderAll();
      document.getElementById('btnStop').disabled = false;
    }
  } catch(e) { /* not critical */ }
})();
</script>
</body>
</html>
